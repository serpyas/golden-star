<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель - Голден Стар</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header">
    <div class="container">
        <div class="header-inner">
            <div class="logo" id="logoContainer">
                <div id="logoDisplay">
                    <h1>Голден Стар</h1>
                    <p>Админ-панель</p>
                </div>
            </div>
            <nav class="nav">
                <a href="index.html" class="nav-link">На сайт</a>
                <a href="admin.html" class="nav-link active">Управление номерами</a>
                <a href="admin-reviews.html" class="nav-link">Отзывы</a>
                <a href="admin-messages.html" class="nav-link">Сообщения</a>
                <div class="user-info-container" style="display: flex; align-items: center; gap: 15px;">
                    <span class="user-name" id="adminName"></span>
                    <button onclick="logout()" class="logout-btn">Выйти</button>
                </div>
            </nav>
            <div class="mobile-menu-btn">☰</div>
        </div>
    </div>
</header>

    <main>
        <section class="page-header">
            <div class="container"><h2>Управление номерами</h2><p>Добавление, редактирование, удаление номеров и управление количеством</p></div>
        </section>

        <section class="admin-controls">
            <div class="container">
                <button class="btn btn-primary" onclick="openAddRoomModal()">+ Добавить номер</button>
            </div>
        </section>

        <section class="rooms-list">
            <div class="container">
                <div class="rooms-grid" id="adminRoomsGrid"></div>
            </div>
        </section>
    </main>

    <!-- Модалка добавления/редактирования номера -->
    <div id="roomEditModal" class="auth-modal">
        <div class="auth-container" style="max-width: 600px;">
            <span class="auth-close" onclick="closeRoomEditModal()">&times;</span>
            <h2 id="roomEditTitle" style="color:#1a3a4f; margin-bottom:20px">Добавить номер</h2>
            <form id="roomEditForm">
                <input type="hidden" id="editRoomId">
                <input type="text" id="editRoomName" placeholder="Название номера" required style="width:100%; padding:10px; margin-bottom:10px">
                <input type="text" id="editRoomArea" placeholder="Площадь (например, 21 м²)" required style="width:100%; padding:10px; margin-bottom:10px">
                <input type="text" id="editRoomBeds" placeholder="Кровати (например, Двуспальная кровать)" required style="width:100%; padding:10px; margin-bottom:10px">
                <input type="number" id="editRoomCount" placeholder="Количество номеров данной категории" required style="width:100%; padding:10px; margin-bottom:10px">
                <input type="number" id="editRoomPrice" placeholder="Цена за ночь (₽)" required style="width:100%; padding:10px; margin-bottom:10px">
                <textarea id="editRoomDescription" placeholder="Описание номера" rows="3" style="width:100%; padding:10px; margin-bottom:10px"></textarea>
                <input type="text" id="editRoomAmenities" placeholder="Удобства (через запятую)" required style="width:100%; padding:10px; margin-bottom:10px">
                <input type="text" id="editRoomImages" placeholder="Ссылки на изображения (через запятую)" required style="width:100%; padding:10px; margin-bottom:10px">
                <button type="submit" class="btn btn-primary" style="width:100%">Сохранить</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
